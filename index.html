<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CAS 噪音地图</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="viz"></canvas>

  <aside class="hud">
    <div class="hud-card hud-header">
      <div>
        <div class="eyebrow">CAS Noise Monitor</div>
        <h1>噪音地图</h1>
      </div>
      <div class="live-dot" id="liveDot"></div>
    </div>

    <div class="hud-card">
      <div id="status" class="status-text">正在加载...</div>
      <div id="subStatus" class="sub-status">等待后端数据...</div>
    </div>

    <div class="hud-card" id="sensorCard">
      <div class="card-title sensor-card-header" id="sensorCardHeader" role="button" tabindex="0">
        设备概览 <span id="sensorCount" class="sensor-count">0</span>
      </div>
      <div id="sensorList" class="sensor-list collapsed" aria-hidden="true">加载中…</div>
    </div>

    <div class="hud-card stats-grid" id="statsGrid">
      <div class="stat-item">
        <span class="stat-label">已注册</span>
        <span class="stat-value" id="registeredCount">0</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">已渲染</span>
        <span class="stat-value" id="renderedCount">0</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">在线</span>
        <span class="stat-value" id="onlineCount">0</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">更新时间</span>
        <span class="stat-value stat-time" id="updatedTime">--:--:--</span>
      </div>
    </div>

    <div class="hud-card">
      <div class="card-title">颜色说明</div>
      <div id="legend" class="legend-list"></div>
    </div>
  </aside>

  <aside class="admin-panel">
    <div class="admin-card admin-header-card">
      <div>
        <div class="eyebrow">Control Panel</div>
        <h2>传感器配置</h2>
      </div>
      <button id="reloadAdminButton" class="secondary-button" type="button">刷新</button>
    </div>

    <div class="admin-card admin-summary-card">
      <div class="admin-section-title">管理概览</div>
      <div id="adminSummary" class="admin-summary-grid">
        <div class="summary-chip"><span>总数</span><strong>0</strong></div>
        <div class="summary-chip"><span>启用</span><strong>0</strong></div>
        <div class="summary-chip"><span>在线</span><strong>0</strong></div>
        <div class="summary-chip"><span>离线/禁用</span><strong>0</strong></div>
      </div>
      <div class="inline-form search-row">
        <input id="adminSearchInput" type="text" placeholder="按 ID 或标签筛选" />
      </div>
      <div class="admin-help">可直接在网页端修改配置。三点校准请分别填写 3 组 dB 与 RMS。</div>
    </div>

    <div class="admin-card admin-add-card">
      <div class="admin-section-title">新增传感器</div>
      <div class="inline-form">
        <input id="newSensorId" type="number" min="0" max="100" placeholder="ID" />
        <button id="addSensorButton" type="button">新增</button>
      </div>
      <div class="admin-help">新增后可直接在下方修改坐标、上报频率和三点校准参数。</div>
    </div>

    <div class="admin-card admin-list-card">
      <div class="admin-section-title">传感器配置</div>
      <div class="mini-help">点标题可展开或收起详细参数。列表区域始终可滚动，适配不同屏幕尺寸。</div>
      <div id="adminSensorList" class="admin-sensor-list">加载中…</div>
    </div>
  </aside>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
